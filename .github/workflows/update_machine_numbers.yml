name: 호기 정보 업데이트
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4
      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 패키지 설치
        run: |
          pip install playwright
          playwright install chromium
      - name: 호기 정보 업데이트
        run: python update_machine_numbers.py
      - name: 변경사항 커밋
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add results/All_Lotto_Data.json
          git diff --staged --quiet || git commit -m "update machine numbers"
          git push
