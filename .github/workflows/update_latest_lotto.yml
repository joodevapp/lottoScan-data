name: 로또 데이터 자동 업데이트

on:
  schedule:
    - cron: '40,45,50,55 11 * * 6'  # 20:40 ~ 20:55
    - cron: '0,5,10,15,20,25,30 12 * * 6'  # 21:00 ~ 21:30
  workflow_dispatch:  # 수동 실행 가능

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v3

      - name: Python 설정
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install requests

      - name: 데이터 업데이트
        run: python update.py

      - name: 변경사항 커밋
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add results/all.json
          git diff --staged --quiet || git commit -m "update $(date '+%Y-%m-%d %H:%M:%S')"
          git push
