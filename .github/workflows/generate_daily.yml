name: 일별 AI 추천 생성
on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4
      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 패키지 설치
        run: pip install requests
      - name: 일별 AI 추천 생성
        run: python generate_daily_recommendation.py
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      - name: 변경사항 커밋
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add results/ai/
          git diff --staged --quiet || git commit -m "update daily recommendation $(date '+%Y-%m-%d')"
          git push
